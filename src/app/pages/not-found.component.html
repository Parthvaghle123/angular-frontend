<div class="sb-404-page">
  <div class="sb-404-bean-layer" aria-hidden="true"></div>

  <div class="sb-404-card sb-animate-fade-in">
    <div class="sb-404-text">
      <div class="sb-404-logo-wrapper">
        <img
          src="https://www.starbucks.in/assets/icon/logo.png"
          alt="Starbucks logo"
          class="sb-404-logo"
        />
      </div>

      <span class="sb-404-eyebrow">Starbucks® Experience</span>

      <h1 class="sb-404-heading">404</h1>

      <p class="sb-404-subtitle">
        Oops! This page is brewing somewhere else.
      </p>

      <p class="sb-404-description">
        The link you followed may be broken, or the page may have been moved.
        Let's take you back to something comforting.
      </p>

      <button
        type="button"
        class="sb-404-button"
        (click)="goHome()"
      >
        Go Back Home
      </button>
    </div>
  </div>
</div>
